<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #5DADE2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: #FFFACD;
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 3px solid #FFFFFF;
        }

        h1 {
            color: #1A5276;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            color: #2C3E50;
            font-size: 1.05rem;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .status {
            color: #27AE60;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #27AE60;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        hr {
            border: none;
            height: 2px;
            background: #87CEEB;
            margin: 25px 0;
            border-radius: 1px;
        }

        .info-block {
            background: #FFFFFF;
            border-radius: 10px;
            padding: 20px;
            margin-top: 10px;
            text-align: left;
            border-left: 4px solid #5DADE2;
        }

        .info-block p {
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .info-block p:last-child {
            margin-bottom: 0;
        }

        .info-block strong {
            color: #1A5276;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud-Native Deployment Success!</h1>
        <p>This site was deployed using <b>GitHub Actions</b>.</p>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>Site Status: Live</span>
        </div>

        <hr>

        <div class="info-block">
            <p><strong>Student Name:</strong> Korchi Nouhaila</p>
            <p><strong>Current Cloud Provider:</strong> GitHub (Microsoft Azure Infrastructure)</p>
        </div>
    </div>
</body>
</html>
