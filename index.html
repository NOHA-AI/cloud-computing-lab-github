<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #5DADE2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #FFFACD;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .cloud-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        h1 {
            color: #1A5276;
            font-size: 1.6rem;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .subtitle {
            color: #5D6D7E;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ABEBC6;
            color: #1E8449;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #27AE60;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tech-tags {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            background: #FFFFFF;
            color: #5D6D7E;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #D5DBDB;
        }

        .info-section {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 25px;
            text-align: left;
            border-left: 3px solid #5DADE2;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #F0F3F4;
            font-size: 0.9rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #7F8C8D;
        }

        .info-value {
            color: #2C3E50;
            font-weight: 600;
        }

        .footer {
            margin-top: 25px;
            color: #A6ACAF;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="cloud-icon">☁️</div>
        <h1>Cloud-Native Deployment Success!</h1>
        <p class="subtitle">This site was deployed using <b>GitHub Actions</b>.</p>
        
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Site Status: Live</span>
        </div>

        <div class="tech-tags">
            <span class="tag">GitHub Actions</span>
            <span class="tag">Azure</span>
            <span class="tag">Cloud-Native</span>
        </div>

        <div class="info-section">
            <div class="info-row">
                <span class="info-label">Student Name</span>
                <span class="info-value">Korchi Nouhaila</span>
            </div>
            <div class="info-row">
                <span class="info-label">Cloud Provider</span>
                <span class="info-value">GitHub (Microsoft Azure)</span>
            </div>
            <div class="info-row">
                <span class="info-label">Deployment Method</span>
                <span class="info-value">CI/CD Pipeline</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Updated</span>
                <span class="info-value" id="timestamp">Loading...</span>
            </div>
        </div>

        <div class="footer">
            <p>Cloud Computing Lab &copy; 2026</p>
        </div>
    </div>

    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
